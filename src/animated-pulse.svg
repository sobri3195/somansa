<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="pulseTitle pulseDesc">
  <title id="pulseTitle">Pulse Network Animation</title>
  <desc id="pulseDesc">Gelombang pulse bergerak dengan node bercahaya.</desc>
  <rect width="640" height="360" rx="24" fill="#081229"/>
  <g opacity="0.35" stroke="#335EBD">
    <path d="M0 80H640"/>
    <path d="M0 140H640"/>
    <path d="M0 200H640"/>
    <path d="M0 260H640"/>
  </g>
  <polyline points="20,200 110,200 155,140 205,270 255,120 315,225 360,170 430,170 470,120 530,240 620,240" stroke="#6EE7FF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <animate attributeName="stroke-dasharray" values="0,1200;320,880;0,1200" dur="5s" repeatCount="indefinite"/>
  </polyline>
  <circle cx="155" cy="140" r="8" fill="#8DF4FF">
    <animate attributeName="r" values="6;11;6" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="255" cy="120" r="8" fill="#8DF4FF">
    <animate attributeName="r" values="6;12;6" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="470" cy="120" r="8" fill="#8DF4FF">
    <animate attributeName="r" values="6;10;6" dur="1.6s" repeatCount="indefinite"/>
  </circle>
</svg>
