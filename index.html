<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Somansa menghadirkan solusi kesehatan, software, dan commerce terintegrasi untuk institusi modern yang ingin bertumbuh lebih cepat." />
    <meta name="theme-color" content="#030712" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            colors: {
              somansa: {
                dark: '#030712',
                panel: '#0b1220',
                line: 'rgba(148, 163, 184, 0.18)',
                cyan: '#67e8f9',
                blue: '#38bdf8',
                purple: '#8b5cf6',
              },
            },
            boxShadow: {
              glow: '0 30px 80px rgba(56, 189, 248, 0.18)',
              panel: '0 30px 80px rgba(2, 8, 23, 0.45)',
            },
            animation: {
              float: 'float 8s ease-in-out infinite',
              pulseSoft: 'pulseSoft 5s ease-in-out infinite',
              shine: 'shine 10s linear infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-12px)' },
              },
              pulseSoft: {
                '0%, 100%': { opacity: '0.55', transform: 'scale(1)' },
                '50%': { opacity: '0.95', transform: 'scale(1.08)' },
              },
              shine: {
                '0%': { backgroundPosition: '0% 50%' },
                '100%': { backgroundPosition: '200% 50%' },
              },
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/src/styles.css" />
    <title>Somansa — Health, Product, and Digital Ecosystem</title>
  </head>
  <body class="bg-slate-950 text-slate-50 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
